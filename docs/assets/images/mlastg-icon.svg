<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3F51B5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A237E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5722;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E64A19;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="#283593" stroke-width="2"/>
  <!-- Shield shape -->
  <path d="M64 18 L98 36 L98 68 Q98 96 64 114 Q30 96 30 68 L30 36 Z" 
        fill="url(#shield)" stroke="#BF360C" stroke-width="1.5" opacity="0.95"/>
  <!-- ML text -->
  <text x="64" y="72" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" 
        fill="white" text-anchor="middle" letter-spacing="2">ML</text>
  <!-- Lock icon hint -->
  <circle cx="64" cy="88" r="4" fill="white" opacity="0.9"/>
  <rect x="60" y="88" width="8" height="6" rx="1" fill="white" opacity="0.9"/>
</svg>
