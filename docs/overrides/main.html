{% extends "base.html" %}

{% block extrahead %}
  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ config.site_url }}">
  <meta property="og:title" content="{{ config.site_name }}">
  <meta property="og:description" content="{{ config.site_description }}">
  <meta property="og:image" content="{{ config.site_url }}assets/images/mlastg-icon.svg">
  <meta property="og:site_name" content="MLASTG">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ config.site_name }}">
  <meta name="twitter:description" content="{{ config.site_description }}">
  <meta name="twitter:image" content="{{ config.site_url }}assets/images/mlastg-icon.svg">

  <!-- Additional SEO -->
  <meta name="robots" content="index, follow">
  <meta name="author" content="MLASTG Contributors">
  <link rel="sitemap" type="application/xml" href="{{ config.site_url }}sitemap.xml">
{% endblock %}
