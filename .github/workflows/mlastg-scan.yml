name: MLASTG Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly on Mondays

jobs:
  mlastg-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install MLASTG CLI and test dependencies
        run: |
          pip install -e .
          pip install scikit-learn numpy requests adversarial-robustness-toolbox

      - name: Run MLASTG Full Scan (Demo Mode)
        run: |
          mlastg scan --target ./ --category all --demo --output mlastg_report.json --format both

      - name: Check Compliance Score
        run: |
          # Fail the build if the demo compliance score drops below the threshold.
          SCORE=$(grep -oP 'Compliance Score:\*\*\s*\K[0-9.]+' mlastg_report.md)
          echo "Current MLASTG Compliance Score: ${SCORE:-unknown}%"
          if [ -z "$SCORE" ]; then
            echo "::error::Could not parse compliance score from mlastg_report.md."
            exit 1
          fi
          if (( $(echo "$SCORE < 80.0" | bc -l) )); then
            echo "::error::MLASTG Compliance Score ($SCORE%) is below the required 80.0% threshold."
            exit 1
          fi

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlastg-security-report
          path: |
            mlastg_report.json
            mlastg_report.md
