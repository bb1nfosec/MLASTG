name: Run MLASTG Test Scripts

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          pip install scikit-learn numpy requests pytest

      - name: Install ART (for adversarial robustness tests)
        run: |
          pip install adversarial-robustness-toolbox

      # --- Demo runs: scripts with --demo flag via argparse (run as Python, NOT pytest) ---

      - name: Run adversarial robustness demo
        run: python tests/model/test_adversarial_robustness.py --demo

      - name: Run data sanitization demo
        run: python tests/data/test_data_sanitization.py --demo

      - name: Run model extraction demo
        run: python tests/model/test_extraction.py --demo

      - name: Run backdoor detection demo
        run: python tests/model/test_backdoor.py --demo

      - name: Run ML-SBOM demo
        run: python tests/supply/test_mlsbom.py --demo

      - name: Validate worked ML-SBOM example (must PASS)
        run: python tests/supply/test_mlsbom.py --sbom demos/ml-sbom/fraud-detector.mlsbom.json

      - name: ML-SBOM negative check (incomplete SBOM must FAIL)
        run: |
          echo '{"model_name":"x"}' > /tmp/incomplete-sbom.json
          if python tests/supply/test_mlsbom.py --sbom /tmp/incomplete-sbom.json; then
            echo "::error::Incomplete SBOM unexpectedly passed validation"; exit 1
          else
            echo "Incomplete SBOM correctly rejected."
          fi

      - name: Run governance audit demo
        run: python tests/gov/test_governance.py --demo

      - name: Run API security demo
        run: python tests/infra/test_api_security.py --demo

      - name: Run pipeline security demo
        run: python tests/pipeline/test_pipeline_security.py --demo

      - name: Run TEE security demo
        run: python tests/infra/test_tee_security.py --demo

      - name: Run prompt injection help (network-dependent, dry-run only)
        run: python tests/llm/test_prompt_injection.py --help

      # --- pytest runs: only files that contain pytest-compatible test_ functions ---
      # NOTE: Do NOT pass --demo to pytest — that is an argparse flag, not a pytest option.

      - name: Run pytest on all compatible tests
        run: python -m pytest -v

      # NOTE: These are demo/smoke runs using synthetic data.
      # Full assessments require actual models and datasets.

