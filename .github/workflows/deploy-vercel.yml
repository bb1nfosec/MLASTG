name: Deploy MLASTG to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build

      - name: Verify build output
        run: |
          if [ ! -f site/index.html ]; then
            echo "ERROR: site/index.html not found after build"
            exit 1
          fi
          echo "Build output verified: site/index.html exists"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Verify Vercel token
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel whoami --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        id: deploy
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          else
            URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Comment PR with Preview URL
        if: github.event_name == 'pull_request' && success() && steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            try {
              const url = '${{ steps.deploy.outputs.url }}';
              if (url && url.startsWith('http')) {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `🚀 **Vercel Preview deployed!**\n\nView the preview at: ${url}`
                });
              }
            } catch (e) {
              core.warning(`Could not post PR comment: ${e.message}`);
            }
