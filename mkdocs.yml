# MLSec Application Security Testing Guide - Documentation Site
site_name: "MLASTG — MLSec Application Security Testing Guide"
site_description: "Enterprise & Defense-Grade Security Testing for Machine Learning Systems — 168 verifiable controls mapped to MITRE ATLAS, NIST AI RMF, OWASP"
site_url: "https://mlastg.vercel.app/"
repo_url: "https://github.com/bb1nfosec/MLASTG"
repo_name: "MLASTG"
edit_uri: "edit/main/docs/"

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/images/mlastg-icon.svg
  favicon: assets/images/favicon.svg
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
  font:
    text: Plus Jakarta Sans
    code: Fira Code

extra_css:
  - stylesheets/extra.css


extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bb1nfosec/MLASTG
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/MLSecProject
    - icon: material/translate
      link: https://github.com/bb1nfosec/MLASTG
  version:
    provider: mike
  generator: false
  alternate:
    - name: English
      link: /
      lang: en
    - name: 中文
      link: /zh/
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes
  - tables
  - toc:
      permalink: true
      title: "On this page"
  - attr_list
  - md_in_html
  - def_list

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: "首页"
            Introduction: "介绍"
            Testing Methodology: "测试方法论"
            Checklist: "检查清单"
            Overview: "概览"
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - minify:
      minify_html: true

